# 與 quick-deploy.sh 配套：不向宿主機發布任何端口（僅 whip-network 內可達 :8080 / :5432）。
# 前置網關須與 agora-callcenter-app 同網。
services:
  agora-callcenter-postgres:
    image: postgres:16-alpine
    container_name: agora-callcenter-postgres
    environment:
      POSTGRES_USER: campaign
      POSTGRES_PASSWORD: campaign123
      POSTGRES_DB: campaign_db
    volumes:
      - agora-callcenter-pgdata:/var/lib/postgresql/data
    networks:
      - whip-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U campaign -d campaign_db']
      interval: 5s
      timeout: 5s
      retries: 10

  agora-callcenter-app:
    container_name: agora-callcenter-app
    build:
      context: ./agora-white-label-callcenter
      dockerfile: Dockerfile
      args:
        APP_VITE_BASE_PATH: ${APP_VITE_BASE_PATH:-/callcenter/}
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://campaign:campaign123@agora-callcenter-postgres:5432/campaign_db
    networks:
      - whip-network
    depends_on:
      agora-callcenter-postgres:
        condition: service_healthy

volumes:
  agora-callcenter-pgdata:

networks:
  whip-network:
    external: true
